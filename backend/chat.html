<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SubBot - Chat</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
    }
    .user-info {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      padding: 10px 15px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .logout-btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
    }
    .logout-btn:hover {
      background: #0056CC;
    }
  </style>
</head>
<body>
  <div id="user-info"></div>
  <div id="root"></div>
  <script type="text/babel" src="/src/main.jsx"></script>
</body>
</html>
